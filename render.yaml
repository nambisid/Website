# Render blueprint for the Yume Yarns API (Express + MongoDB).
# Render → New → Blueprint → point at this repo to create the service.
# Secrets are set in the Render dashboard (sync: false = not committed here).

services:
  - type: web
    name: yume-yarns-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render provides PORT automatically — server.js already reads process.env.PORT.
      - key: MONGODB_URI          # MongoDB Atlas connection string
        sync: false
      - key: JWT_SECRET           # long random string
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: siddharth.lampard@gmail.com
      - key: EMAIL_FROM_NAME
        value: Yume Yarns
      - key: CLIENT_URL           # your live site URL (update if you add a custom domain)
        value: https://fluffy-crepe-70a6a6.netlify.app
      - key: CORS_ORIGIN          # same site URL
        value: https://fluffy-crepe-70a6a6.netlify.app
