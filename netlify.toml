# Netlify config for the Stitch & Bloom frontend.
# The Express API can't run on Netlify, so the backend lives on Render and
# Netlify PROXIES /api and /uploads to it. That keeps the browser seeing one
# origin, so the httpOnly refresh cookie (SameSite=strict) keeps working.

[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# 1) Proxy API + uploads to the Render backend.
#    Replace YOUR-BACKEND with your real Render service subdomain after deploying it.
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://YOUR-BACKEND.onrender.com/uploads/:splat"
  status = 200
  force = true

# 2) SPA fallback — every other path serves the React app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
